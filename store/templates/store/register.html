<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>

<body style="
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
">

<div style="
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 0 15px lightgray;
text-align:center;
">

<h1>📝 Register</h1>

<form method="POST">
    {% csrf_token %}

    <input type="text"
           name="username"
           placeholder="Enter Username"
           required
           style="
           width:90%;
           padding:12px;
           margin:10px;
           border:1px solid gray;
           border-radius:5px;">

    <input type="password"
           name="password"
           placeholder="Enter Password"
           required
           style="
           width:90%;
           padding:12px;
           margin:10px;
           border:1px solid gray;
           border-radius:5px;">

    <br><br>

    <button type="submit"
            style="
            background:#007bff;
            color:white;
            border:none;
            padding:12px 30px;
            border-radius:5px;
            font-size:16px;">
        Register
    </button>

</form>

</div>

</body>
</html>
