<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>
</head>
<body>

<div style="background:#333; padding:10px; text-align:center;">
    <a href="/" style="color:white; margin:10px;">Home</a>
    <a href="/products/" style="color:white; margin:10px;">Products</a>
    <a href="/cart/" style="color:white; margin:10px;">Cart</a>
</div>

<h1>{{ product.name }}</h1>

{% if product.image %}
<img src="{{ product.image.url }}" width="300">
{% endif %}

<h2>₹{{ product.price }}</h2>

<p>{{ product.description }}</p>

<a href="/cart/add/{{ product.id }}/">
    <button>Add to Cart</button>
</a>

</body>
</html>
